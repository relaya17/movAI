name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (no `any` gate lives here - see packages/config/eslint-preset.js)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm --filter @movai/web exec playwright install --with-deps chromium

      - name: Playwright smoke
        working-directory: apps/web
        env:
          CI: "true"
          PLAYWRIGHT_PORT: "3110"
          AUTH_SECRET: "playwright-ci-auth-secret-32chars!!"
          AUTH_URL: "http://127.0.0.1:3110"
          NEXT_PUBLIC_APP_URL: "http://127.0.0.1:3110"
        run: pnpm test:e2e
